<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Guías</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 10px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
        }
        
        .btn-new {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        
        .btn-new:hover {
            background-color: #218838;
        }
        
        .notice {
            background-color: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            color: #004085;
        }
        
        .guide-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            background-color: #f9f9f9;
        }
        
        .guide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .guide-number {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-emitida {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        
        .status-asignada {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-en_ruta {
            background-color: #cfe2ff;
            color: #084298;
        }
        
        .status-entregada {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        
        .guide-info {
            font-size: 14px;
            color: #666;
            margin: 5px 0;
        }
        
        .guide-info strong {
            color: #333;
        }
        
        a {
            color: #007bff;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .guide-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Guías de Despacho</h1>
            <a href="{% url 'create_guide' %}" class="btn-new">+ Nueva Guía</a>
        </div>
        
        <div class="notice">
            <strong>Próximamente:</strong> Aquí se listarán todas las guías de despacho del sistema con su estado actual.
        </div>
        
        <a href="{% url 'home' %}">← Volver al inicio</a>
    </div>
</body>
</html>
